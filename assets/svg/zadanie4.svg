    <g id="group_r2" transform="translate(-150, -21)">
        <use xlink:href="#group1" />
    </g>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="white" stop-opacity=""/>
        <stop offset="100%" stop-color="#097e9e" stop-opacity=""/>
        
    </linearGradient>
    <g id="circle" fill="none" stroke="black" stroke-width="4">
        <circle cx="150" cy="150" r="150" fill="url(#gradient1)"/>
    </g>
    <g id="numbers" transform="translate(-150,-21)">
        <text x=""  y="" style="">12</text>
    </g>
    </defs>
    
