<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="300" height="300" viewBox="0 0 300 300">
    <defs>
    <!-- Wskazówka -->
    <g id="wskazowka" stroke="black" stroke-width="1" visibility="none"> 
        <path d="M 0 21 l 100 -20 l 50 20 z"
             fill="black" stroke="black" />
        <path d="M 0 21 l 100 20 l 50 -20 z"
             fill="white" stroke="black" />
    </g>
    <g id="group_r1" transform="translate(0, -21)">
        <use xlink:href="#wskazowka" />
    </g>
    <g id="group_r2" transform="translate(-150, -21) ">
        <use xlink:href="#wskazowka" />
        <circle cx="0" cy="21" r="5" fill="white" stroke="black"/>
        <circle cx="0" cy="21" r="2" fill="black"/>
    </g>
    </defs>
    
    <use xlink:href="#group_r2" transform="translate(150,150) rotate(0) scale(1)"/>
    <use xlink:href="#group_r2" transform="translate(150,150) rotate(45) scale(0.9)"/>
    <use xlink:href="#group_r2" transform="translate(150,150) rotate(90) scale(0.8)"/>
    <use xlink:href="#group_r2" transform="translate(150,150) rotate(135) scale(0.7)"/>
    <use xlink:href="#group_r2" transform="translate(150,150) rotate(180) scale(0.6)"/>
    <use xlink:href="#group_r2" transform="translate(150,150) rotate(225) scale(0.5)"/>
    <use xlink:href="#group_r2" transform="translate(150,150) rotate(270) scale(0.4)"/>
    <use xlink:href="#group_r2" transform="translate(150,150) rotate(315) scale(0.3)"/>

</svg>