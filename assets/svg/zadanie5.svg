<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
    <defs>
    <!-- Wskazówka -->
    <g id="wskazowka" stroke="black" stroke-width="1" visibility="none"> 
        <path d="M 0 21 l 100 -20 l 50 20 z"
             fill="black" stroke="black" />
        <path d="M 0 21 l 100 20 l 50 -20 z"
             fill="white" stroke="black" />
    </g>
     <!-- Znacznik minutowy -->
    <line id="znak-minuty" x1="150" y1="10" x2="150" y2="15" stroke="black" stroke-width="1"/>
    <!-- Znacznik godzinowy -->
    <line id="znak-godziny" x1="150" y1="10" x2="150" y2="20" stroke="black" stroke-width="2"/>

    <g id="group_r1" transform="translate(0, -21)">
        <use xlink:href="#wskazowka" />
    </g>
    <g id="group_r2" transform="translate(-150, -21) ">
        <use xlink:href="#wskazowka" />
        <circle cx="0" cy="21" r="5" fill="white" stroke="black"/>
        <circle cx="0" cy="21" r="2" fill="black"/>
    </g>

    <linearGradient id="tarcza" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="white" stop-opacity=""/>
        <stop offset="100%" stop-color="#097e9e" stop-opacity=""/>
    </linearGradient>
    </defs>
    
    <!-- Tarcza zegara -->
    <circle cx="150" cy="150" r="140" fill="url(#tarcza)" stroke="black" stroke-width="3"/>
    <circle cx="150" cy="150" r="6" fill-opacity="0" stroke="black" stroke-width=".5"/>
    
    <!-- Znaczniki godzin i minut -->
