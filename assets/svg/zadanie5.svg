    <!-- Cyfry godzin z użyciem transform, obrócone do pionu -->
    <g id="liczby" font-size="14" fill="darkred" font-family="serif" transform="translate(150,155)">
        <text transform="rotate(0) translate(0,-120) rotate(0)" text-anchor="middle">12</text>
        <text transform="rotate(30) translate(0,-120) rotate(-30)" text-anchor="middle">1</text>
        <text transform="rotate(60) translate(0,-120) rotate(-60)" text-anchor="middle">2</text>
        <text transform="rotate(90) translate(0,-120) rotate(-90)" text-anchor="middle">3</text>
        <text transform="rotate(120) translate(0,-120) rotate(-120)" text-anchor="middle">4</text>
        <text transform="rotate(150) translate(0,-120) rotate(-150)" text-anchor="middle">5</text>
        <text transform="rotate(180) translate(0,-120) rotate(-180)" text-anchor="middle">6</text>
        <text transform="rotate(210) translate(0,-120) rotate(-210)" text-anchor="middle">7</text>
        <text transform="rotate(240) translate(0,-120) rotate(-240)" text-anchor="middle">8</text>
        <text transform="rotate(270) translate(0,-120) rotate(-270)" text-anchor="middle">9</text>
        <text transform="rotate(300) translate(0,-120) rotate(-300)" text-anchor="middle">10</text>
        <text transform="rotate(330) translate(0,-120) rotate(-330)" text-anchor="middle">11</text>
    </g>
    
    <!-- Wskazówki zegara -->
    <use xlink:href="#group_r1" transform="translate(150,150) rotate(270) scale(0.7)"/>
    <use xlink:href="#group_r1" transform="translate(150,150) rotate(180) scale(0.6)"/>
    <use xlink:href="#group_r1" transform="translate(150,150) rotate(20) scale(0.4)"/>

    <!-- Środek -->
    <circle cx="150" cy="150" r="3" fill="white" stroke="black" stroke-width="2"/>
    
